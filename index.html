<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access - Verify to Continue</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-bottom: 90px;
        }
      .container {
            max-width: 500px;
            width: 100%;
            background: #0f0f1a;
            border-radius: 20px;
            padding: 0;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 2px solid #e94560;
            overflow: hidden;
        }
      .header {
            background: linear-gradient(90deg, #e94560, #c23616);
            padding: 25px 20px;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
      .subtitle { font-size: 13px; opacity: 0.9; }
      .content {
            padding: 25px;
        }
      .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
      .thumb {
            background: #1a1a2e;
            border-radius: 8px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #222;
            position: relative;
            cursor: pointer;
        }
      .thumb::after {
            content: "🔒 18+";
            font-size: 24px;
            opacity: 0.3;
        }
      .banner-box {
            background: #0a0a14;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 10px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
      .btn {
            background: linear-gradient(90deg, #e94560, #ff4757);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            margin: 15px 0;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }
      .btn:active { transform: scale(0.97); }
      .clicks {
            font-size: 14px;
            color: #00ff88;
            margin: 15px 0;
            font-weight: bold;
        }
      .warning {
            font-size: 11px;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
            padding: 0 25px 25px;
        }
      .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>

    <!-- Adsterra Popunder -->
    <script src="https://assistedtogether.com/5f/38/0c/5f380c14825610676caa2f55e97caae9.js"></script>
    
    <!-- Adsterra Social Bar -->
    <script src="https://assistedtogether.com/90/a4/fd/90a4fdc80526b9adc3035a5a7f3cf034.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">🔞 ADULTS ONLY</div>
            <h1>Premium Content Locked</h1>
            <p class="subtitle">Verify your age to unlock 1000+ videos</p>
        </div>

        <div class="content">
            <div class="video-grid">
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
            </div>

            <!-- Adsterra Banner 728x90 -->
            <div class="banner-box">
                <script>
                  atOptions = {
                    'key' : '232952433b4d8f80b0bba157d01ca205',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                  };
                </script>
                <script src="https://assistedtogether.com/232952433b4d8f80b0bba157d01ca205/invoke.js"></script>
            </div>

            <button class="btn" id="continueBtn">🔓 Unlock All Videos</button>
            
            <div class="clicks" id="clickText">Click 3 times to verify & load ads</div>
        </div>

        <p class="warning">
            You must be 18+ to enter. By clicking you agree to view sponsored content and verify your age.<br>
            This site contains advertisements. No explicit content hosted here.
        </p>
    </div>

    <!-- Adsterra Native Banner -->
    <script async="async" data-cfasync="false" src="https://assistedtogether.com/71015029677504e1b574bd26a1936aae/invoke.js"></script>
    <div id="container-71015029677504e1b574bd26a1936aae"></div>

    <script>
        let clickCount = 0;
        const maxClicks = 3;
        const btn = document.getElementById('continueBtn');
        const clickText = document.getElementById('clickText');
        
        // ඔයාගේ Video Link එක මෙතන දාන්න
        const videoLink = 'https://your-video-link.com';

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            clickCount++;
            
            if (clickCount === 1) {
                clickText.textContent = '✅ Step 1/3 Done - Click again';
                clickText.style.color = '#ffa502';
                btn.textContent = '⏳ Verifying... Click Again';
            } else if (clickCount === 2) {
                clickText.textContent = '✅ Step 2/3 Done - Final click';
                clickText.style.color = '#ff6348';
                btn.textContent = '🔓 Final Unlock';
            } else if (clickCount >= maxClicks) {
                clickText.textContent = '✅ Verified - Opening content...';
                clickText.style.color = '#2ed573';
                btn.textContent = '✓ Redirecting';
                btn.style.background = 'linear-gradient(90deg, #2ed573, #1dd1a1)';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = videoLink;
                }, 1500);
            }
        });
    </script>
</body>
</html>
