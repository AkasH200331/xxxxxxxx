    <script>
        let clickCount = 0;
        const maxClicks = 5;
        const btn = document.getElementById('continueBtn');
        const clickText = document.getElementById('clickText');
        
        // ඔයාගේ Video Link එක මෙතන දාන්න
        const videoLink = 'https://your-video-link.com';

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            clickCount++;
            
            if (clickCount === 1) {
                clickText.textContent = '✅ Step 1/5 Done - Click again';
                clickText.style.color = '#ffa502';
            } else if (clickCount === 2) {
                clickText.textContent = '✅ Step 2/5 Done - Keep clicking';
                clickText.style.color = '#ff9f43';
            } else if (clickCount === 3) {
                clickText.textContent = '✅ Step 3/5 Done - Almost there';
                clickText.style.color = '#ff7f50';
            } else if (clickCount === 4) {
                clickText.textContent = '✅ Step 4/5 Done - Final click';
                clickText.style.color = '#ff6348';
                btn.textContent = '🔓 Final Unlock';
            } else if (clickCount >= maxClicks) {
                clickText.textContent = '✅ Verified - Opening content...';
                clickText.style.color = '#2ed573';
                btn.textContent = '✓ Redirecting';
                btn.style.background = 'linear-gradient(90deg, #2ed573, #1dd1a1)';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = videoLink;
                }, 1500);
            }
        });
